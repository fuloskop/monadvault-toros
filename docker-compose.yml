services:
  postgres:
    image: postgres:16-alpine
    container_name: monadvault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monadvault
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis is already running on port 6379 from another container
  # Use existing Redis instance or uncomment below with a different port

volumes:
  postgres_data:

