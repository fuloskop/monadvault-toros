name: Quality Check

# Build + deploy Coolify'a delegated:
#   - games-backend (UUID r84pj4aqfpy88p2qru9qcx7q) → Dockerfile /backend/Dockerfile
#   - games-frontend (UUID bsu13phd8m6ahvujvt50yyze) → Dockerfile /frontend/Dockerfile
# Her ikisi de fuloskop/monadvault-toros source'lu, toroscs-coolify GitHub App
# ile install edili. GitHub App webhook her push'ta Coolify'da otomatik build
# tetikliyor — bu workflow'da deploy step'i YOK.
#
# Bu workflow sadece "early signal" — type check fail olursa Coolify build
# zaten kıracak (Dockerfile builder stage'i npm run build çalıştırıyor), ama
# GHA daha hızlı (~30s) ve developer'a daha net log verir.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'deploy/**'
      - '.gitignore'
      - 'LICENSE'
      - 'backend/prisma/migrations.postgres-archive/**'
      - 'contracts/**'

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --workspace=${{ matrix.workspace }} --include-workspace-root --no-audit --no-fund

      - name: Prisma generate (backend only)
        if: matrix.workspace == 'backend'
        working-directory: backend
        env:
          DATABASE_URL: mysql://x:x@localhost:3306/x
        run: npx prisma generate

      - name: Type check
        working-directory: ${{ matrix.workspace }}
        run: npx tsc --noEmit
