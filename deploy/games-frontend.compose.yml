# TOROS Games frontend — Coolify Docker Compose deployment.
# caddy-docker-proxy labels: torosclan.com/games/* → frontend:3000.

services:
  frontend:
    image: ghcr.io/fuloskop/monadvault-toros-frontend:${IMAGE_TAG:-latest}
    pull_policy: missing
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/games/"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 5
    labels:
      caddy_0: https://torosclan.com
      # `handle` path'i strip ETMEZ; Next.js basePath=/games request'lerini
      # `/games/...` olarak alır. (Backend `handle_path` kullanır çünkü
      # express routes /api/... ile başlıyor, /games prefix'i yok.)
      # `/games*` hem bare `/games` hem `/games/...`'i yakalar; `/games/*`
      # bare `/games`'i miss eder, toroscs catch-all'a düşüyordu.
      caddy_0.handle_1: /games*
      caddy_0.handle_1.0_reverse_proxy: "{{upstreams 3000}}"
      caddy_ingress_network: coolify
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
