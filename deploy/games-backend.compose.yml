# TOROS Games backend — Coolify Docker Compose deployment.
# Toroscs ile birebir aynı pattern: pre-built ghcr image + coolify external
# network (Caddy proxy bu network'te dinliyor) + env_file ile runtime vars.

services:
  backend:
    image: ghcr.io/fuloskop/monadvault-toros-backend:${IMAGE_TAG:-latest}
    pull_policy: missing
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 5
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
