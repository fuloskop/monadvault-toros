# TOROS Games backend — Coolify Docker Compose deployment.
# caddy-docker-proxy labels: torosclan.com/games/api/* → backend:4000.
# Toroscs (catch-all /*) ile aynı host'u paylaşır, Caddy longest-match
# wins prensibiyle `/games/api/*`'i daha spesifik bulup buraya yönlendirir.

services:
  backend:
    image: ghcr.io/fuloskop/monadvault-toros-backend:${IMAGE_TAG:-latest}
    pull_policy: missing
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 5
    labels:
      caddy_0: https://torosclan.com
      caddy_0.handle_path_0: /games/api/*
      caddy_0.handle_path_0.0_reverse_proxy: "{{upstreams 4000}}"
      caddy_ingress_network: coolify
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
