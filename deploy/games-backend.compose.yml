# TOROS Games backend — Coolify Docker Compose deployment.
# Toroscs ile birebir aynı pattern: pre-built image ghcr.io'dan, host'a
# GHA tarafından SSH üzerinden pre-pull edilir, sonra Coolify webhook ile
# `docker compose up -d` tetiklenir.
#
# pull_policy: missing → GHA pre-pull ile race-condition koruması
# (containerd content-store GC issue, toroscs 2026-04-21 outage notu).

services:
  backend:
    image: ghcr.io/fuloskop/monadvault-toros-backend:${IMAGE_TAG:-latest}
    pull_policy: missing
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 5
